name: Build shadowsocks

on:
  push:
    branches: [ shadowsocks ]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v5.3.5-mino. Leave empty to use the run number.
        required: false
        type: string
      release_name:
        description: Release title. Leave empty to reuse the tag.
        required: false
        type: string
      prerelease:
        description: Mark the GitHub release as a prerelease.
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: jetbrains
          java-version: 21

      - name: Set up Rust targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-linux-androideabi,aarch64-linux-android,i686-linux-android,x86_64-linux-android

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core/src/main/rust/shadowsocks-rust/target
          key: cargo-${{ runner.os }}-${{ hashFiles('core/src/main/rust/shadowsocks-rust/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Configure APK signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            if [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
              echo "ANDROID_KEYSTORE_BASE64 is set, but one or more signing secrets are missing." >&2
              exit 1
            fi

            keystore="$RUNNER_TEMP/release.keystore"
            printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore"
            echo "SIGNING_STORE_FILE=$keystore" >> "$GITHUB_ENV"
            echo "SIGNING_STORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
            echo "SIGNING_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> "$GITHUB_ENV"
            echo "SIGNING_KEY_PASSWORD=$ANDROID_KEY_PASSWORD" >> "$GITHUB_ENV"
          else
            echo "::warning::ANDROID_KEYSTORE_BASE64 is not set. Building with a temporary debug keystore; APKs from different runs may not have the same signature."
            keystore="$RUNNER_TEMP/debug.keystore"
            keytool -genkeypair -v -keystore "$keystore" -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
            echo "SIGNING_STORE_FILE=$keystore" >> "$GITHUB_ENV"
            echo "SIGNING_STORE_PASSWORD=android" >> "$GITHUB_ENV"
            echo "SIGNING_KEY_ALIAS=androiddebugkey" >> "$GITHUB_ENV"
            echo "SIGNING_KEY_PASSWORD=android" >> "$GITHUB_ENV"
          fi

      - name: Build release APKs
        run: |
          ./gradlew :mobile:assembleRelease \
            -PCARGO_PROFILE=release \
            -Pandroid.injected.signing.store.file="$SIGNING_STORE_FILE" \
            -Pandroid.injected.signing.store.password="$SIGNING_STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$SIGNING_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$SIGNING_KEY_PASSWORD"

      - name: Prepare release assets
        env:
          TAG_INPUT: ${{ inputs.tag }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          tag="${TAG_INPUT:-shadowsocks-${RUN_NUMBER}}"
          mkdir -p release-assets
          for apk in mobile/build/outputs/apk/release/*.apk; do
            abi="$(basename "$apk" | sed -E 's/^mobile-(.*)-release.*\.apk$/\1/')"
            cp "$apk" "release-assets/shadowsocks-${abi}-${tag}.apk"
          done
          ls -lh release-assets

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || format('shadowsocks-{0}', github.run_number) }}
          name: ${{ inputs.release_name || inputs.tag || format('shadowsocks-{0}', github.run_number) }}
          prerelease: ${{ inputs.prerelease }}
          files: release-assets/*.apk
